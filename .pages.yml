media:
  input: public/img
  output: /img

content:
  - name: posts
    label: 博客文章
    type: collection
    path: src/content/posts
    fields:
      - name: title
        label: 文章标题
        type: string
        required: true
      
      - name: slug
        label: URL标识
        type: string
        required: true
        pattern: ['^[a-z0-9-]+$', '只能包含小写字母、数字和连字符']
      
      - name: date
        label: 发布日期
        type: date
        required: true
      
      - name: categories
        label: 分类
        type: list
        field: 
          type: string
      
      - name: author
        label: 作者
        type: string
        required: true
      
      - name: body
        label: 正文内容
        type: rich-text

settings:
  defaultBranch: main
  commitMessage: 'chore: update content via Pages CMS [skip ci]'