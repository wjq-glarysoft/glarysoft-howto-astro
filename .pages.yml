media:
  - input: src/assets/images
    output: /assets/images

content:
  - name: posts
    label: 博客文章
    type: collection
    path: src/content/posts
    fields:
      - name: title
        label: 文章标题
        type: string
        required: true
        description: 文章的完整标题

      - name: slug
        label: URL标识
        type: string
        required: true
        pattern: ['^[a-z0-9-]+$', '只能包含小写字母、数字和连字符']
        description: 用于生成文章URL，例如: free-up-disk-space

      - name: date
        label: 发布日期
        type: date
        required: true
        description: 文章发布的日期

      - name: categories
        label: 分类
        type: list
        required: true
        description: 文章所属的分类
        fields:
          - name: category
            label: 分类名称
            type: string
            options:
              - optimize-improve
              - tutorial
              - news

      - name: author
        label: 作者
        type: string
        required: true
        description: 文章作者的用户名

      - name: body
        label: 正文内容
        type: rich-text
        required: true
        description: 文章的主要内容