media:
  input: public/img
  output: /img

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    view:
      fields: [title, date, categories]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date }
      - { name: slug, label: Slug, type: string, pattern: ['^[a-z0-9-]+$', '只能包含小写字母、数字和连字符'] }
      - { name: categories, label: Categories, type: string, list: true }  
      - { name: author, label: Author, type: string }
      - name: body
        label: Body
        type: rich-text
        options:
          input: src/assets/images
          output: /assets/images

media:
  input: public/img
  output: /img
content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: author, label: Author, type: string }
      - { name: date, label: Date, type: date }
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string }
      - { name: categories, label: Tags, type: string, list: true }
      - { name: body, label: Body, type: rich-text }